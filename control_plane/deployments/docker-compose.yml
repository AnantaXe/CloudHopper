services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cloudhopper
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cloudhopper
    ports:
      - "5432:5432"
  # es:
  #     - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  postgres-temporal:
    image: postgres:15
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: password
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"

  # redis:
  #   image: redis:7
  #   ports:
  #     - "6379:6379"

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      - postgres-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: password
      POSTGRES_DB: temporal
      POSTGRES_SEEDS: postgres-temporal
    ports:
      - "7233:7233"


  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal